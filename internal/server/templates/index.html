<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Agent Chat</h1>
            <div class="search-container">
                <input type="text"
                       id="search-input"
                       class="search-input"
                       placeholder="Search messages..."
                       autocomplete="off">
            </div>
            <div class="status" id="status">
                <span class="status-dot disconnected"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </header>

        <div class="main">
            <aside class="sidebar" id="workspaces">
                <div class="sidebar-header">WORKSPACES</div>
                <nav class="workspace-list">
                    {{range .Workspaces}}
                    <a href="?workspace={{.Name}}"
                       hx-get="/messages?workspace={{.Name}}"
                       hx-target="#message-panel"
                       hx-push-url="?workspace={{.Name}}"
                       data-workspace="{{.Name}}"
                       data-latest-time="{{.LatestMsgTime}}"
                       class="workspace-item {{if eq .Name $.SelectedWorkspace}}active{{end}}">
                        <span class="workspace-hash">#</span>{{.Name}}
                        <span class="unread-indicator"></span>
                    </a>
                    {{else}}
                    <div class="no-workspaces">No workspaces found</div>
                    {{end}}
                </nav>
                <div class="sidebar-footer">
                    {{len .Sources}} source{{if ne (len .Sources) 1}}s{{end}} configured
                </div>
            </aside>

            <main class="content">
                <div class="channel-header">
                    {{if .SelectedWorkspace}}
                    <span class="channel-name">#{{.SelectedWorkspace}}</span>
                    {{else}}
                    <span class="channel-name">Select a workspace</span>
                    {{end}}
                </div>

                <div class="message-panel" id="message-panel"
                     hx-ext="sse"
                     sse-connect="/events"
                     sse-swap="message"
                     hx-swap="beforeend">
                    {{template "messages.html" .}}
                </div>
            </main>
        </div>
    </div>

    <script>
        // Unread tracking using localStorage
        const STORAGE_KEY = 'agent-chat-read-times';

        function getReadTimes() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch (e) {
                return {};
            }
        }

        function setReadTime(workspace, time) {
            const times = getReadTimes();
            times[workspace] = time;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(times));
        }

        function updateUnreadIndicators() {
            const readTimes = getReadTimes();
            document.querySelectorAll('.workspace-item').forEach(function(el) {
                const workspace = el.dataset.workspace;
                const latestTime = parseInt(el.dataset.latestTime, 10) || 0;
                const readTime = readTimes[workspace] || 0;

                if (latestTime > readTime) {
                    el.classList.add('has-unread');
                } else {
                    el.classList.remove('has-unread');
                }
            });
        }

        function markWorkspaceAsRead(workspace) {
            const el = document.querySelector(`.workspace-item[data-workspace="${workspace}"]`);
            if (el) {
                const latestTime = parseInt(el.dataset.latestTime, 10) || Date.now();
                setReadTime(workspace, latestTime);
                el.classList.remove('has-unread');
            }
        }

        // SSE connection status handling
        document.body.addEventListener('htmx:sseOpen', function(e) {
            document.querySelector('.status-dot').className = 'status-dot connected';
            document.querySelector('.status-text').textContent = 'Connected';
        });

        document.body.addEventListener('htmx:sseError', function(e) {
            document.querySelector('.status-dot').className = 'status-dot disconnected';
            document.querySelector('.status-text').textContent = 'Disconnected';
        });

        // Handle SSE messages for unread indicators
        document.body.addEventListener('htmx:sseMessage', function(e) {
            if (e.detail.type === 'message') {
                try {
                    const msg = JSON.parse(e.detail.data);
                    const workspace = msg.workspace;
                    const msgTime = new Date(msg.timestamp).getTime();

                    // Update the data-latest-time for this workspace
                    const wsEl = document.querySelector(`.workspace-item[data-workspace="${workspace}"]`);
                    if (wsEl) {
                        const currentLatest = parseInt(wsEl.dataset.latestTime, 10) || 0;
                        if (msgTime > currentLatest) {
                            wsEl.dataset.latestTime = msgTime;
                        }

                        // If not the active workspace, show unread
                        if (!wsEl.classList.contains('active')) {
                            wsEl.classList.add('has-unread');
                        }
                    }
                } catch (err) {
                    // Ignore parse errors
                }
            }
        });

        // Auto-scroll to bottom on new messages
        const panel = document.getElementById('message-panel');
        const observer = new MutationObserver(function() {
            panel.scrollTop = panel.scrollHeight;
        });
        observer.observe(panel, { childList: true, subtree: true });

        // Initial scroll
        panel.scrollTop = panel.scrollHeight;

        // Handle workspace clicks - update active state and mark as read
        document.querySelectorAll('.workspace-item').forEach(function(el) {
            el.addEventListener('click', function() {
                document.querySelectorAll('.workspace-item').forEach(function(item) {
                    item.classList.remove('active');
                });
                this.classList.add('active');
                markWorkspaceAsRead(this.dataset.workspace);
            });
        });

        // Initial unread check
        updateUnreadIndicators();

        // Mark initially selected workspace as read
        const activeWs = document.querySelector('.workspace-item.active');
        if (activeWs) {
            markWorkspaceAsRead(activeWs.dataset.workspace);
        }

        // Search functionality
        const searchInput = document.getElementById('search-input');
        let noResultsEl = null;

        function filterMessages(query) {
            const normalizedQuery = query.toLowerCase().trim();
            const messages = document.querySelectorAll('.message');
            let visibleCount = 0;

            messages.forEach(function(msg) {
                if (!normalizedQuery) {
                    msg.classList.remove('search-hidden');
                    visibleCount++;
                    return;
                }

                const body = (msg.dataset.body || '').toLowerCase();
                const from = (msg.dataset.from || '').toLowerCase();
                const to = (msg.dataset.to || '').toLowerCase();
                const workspace = (msg.dataset.workspace || '').toLowerCase();

                const matches = body.includes(normalizedQuery) ||
                               from.includes(normalizedQuery) ||
                               to.includes(normalizedQuery) ||
                               workspace.includes(normalizedQuery);

                if (matches) {
                    msg.classList.remove('search-hidden');
                    visibleCount++;
                } else {
                    msg.classList.add('search-hidden');
                }
            });

            // Show/hide no results message
            const container = document.querySelector('.messages-container');
            if (container) {
                if (visibleCount === 0 && normalizedQuery && messages.length > 0) {
                    if (!noResultsEl) {
                        noResultsEl = document.createElement('div');
                        noResultsEl.className = 'no-search-results';
                        noResultsEl.innerHTML = '<p>No messages match your search</p><p class="hint">Try a different search term</p>';
                    }
                    if (!container.contains(noResultsEl)) {
                        container.appendChild(noResultsEl);
                    }
                } else if (noResultsEl && container.contains(noResultsEl)) {
                    container.removeChild(noResultsEl);
                }
            }
        }

        searchInput.addEventListener('input', function() {
            filterMessages(this.value);
        });

        // Re-apply search filter when messages are loaded via HTMX
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'message-panel') {
                filterMessages(searchInput.value);
            }
        });

        // Keyboard navigation
        (function() {
            var selectedIndex = -1;
            var lastKeyTime = 0;
            var lastKey = '';

            function getMessages() {
                return Array.from(document.querySelectorAll('.message:not(.search-hidden)'));
            }

            function selectMessage(index) {
                var messages = getMessages();
                if (messages.length === 0) return;

                // Clamp index
                index = Math.max(0, Math.min(index, messages.length - 1));

                // Remove previous selection
                document.querySelectorAll('.message').forEach(function(m) {
                    m.classList.remove('selected');
                });

                // Select new message
                selectedIndex = index;
                messages[index].classList.add('selected');
                messages[index].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }

            function isInputFocused() {
                var el = document.activeElement;
                if (!el) return false;
                var tag = el.tagName.toLowerCase();
                return tag === 'input' || tag === 'textarea' || el.isContentEditable;
            }

            document.addEventListener('keydown', function(e) {
                if (isInputFocused()) return;

                var key = e.key.toLowerCase();
                var now = Date.now();

                // g+w chord: jump to workspace list
                if (lastKey === 'g' && key === 'w' && (now - lastKeyTime) < 500) {
                    e.preventDefault();
                    var firstWorkspace = document.querySelector('.workspace-item');
                    if (firstWorkspace) {
                        firstWorkspace.focus();
                    }
                    lastKey = '';
                    return;
                }

                // Track g key for chord
                if (key === 'g') {
                    lastKey = 'g';
                    lastKeyTime = now;
                    return;
                }

                // j: next message
                if (key === 'j') {
                    e.preventDefault();
                    var messages = getMessages();
                    if (messages.length === 0) return;
                    if (selectedIndex < 0) {
                        selectMessage(0);
                    } else {
                        selectMessage(selectedIndex + 1);
                    }
                    return;
                }

                // k: previous message
                if (key === 'k') {
                    e.preventDefault();
                    var messages = getMessages();
                    if (messages.length === 0) return;
                    if (selectedIndex < 0) {
                        selectMessage(messages.length - 1);
                    } else {
                        selectMessage(selectedIndex - 1);
                    }
                    return;
                }

                // /: focus search (if exists)
                if (key === '/') {
                    e.preventDefault();
                    searchInput.focus();
                    return;
                }

                // Reset chord tracking for other keys
                lastKey = '';
            });

            // Reset selection when messages container updates
            var msgPanel = document.getElementById('message-panel');
            var msgObserver = new MutationObserver(function() {
                // Keep selection valid if messages changed
                var messages = getMessages();
                if (selectedIndex >= messages.length) {
                    selectedIndex = messages.length - 1;
                }
            });
            msgObserver.observe(msgPanel, { childList: true, subtree: true });
        })();
    </script>
</body>
</html>
